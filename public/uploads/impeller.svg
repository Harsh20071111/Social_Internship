<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background Grid -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#34495e" />
      <stop offset="100%" stop-color="#2c3e50" />
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfdfd" />
      <stop offset="30%" stop-color="#d2d7db" />
      <stop offset="70%" stop-color="#7f8c8d" />
      <stop offset="100%" stop-color="#505a5b" />
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#95a5a6" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />
  
  <!-- Technical Blueprint Circles -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#34495e" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5" />
  <circle cx="100" cy="100" r="70" fill="none" stroke="#1abc9c" stroke-width="1" opacity="0.3" />
  <circle cx="100" cy="100" r="45" fill="none" stroke="#1abc9c" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4" />

  <!-- Impeller Blades Group -->
  <g transform="translate(100, 100)">
    <!-- Blade 1 (Top) -->
    <path d="M 0,0 C -15,-25 -25,-55 -10,-75 C -2,-85 15,-80 20,-65 C 22,-45 10,-20 0,0" fill="url(#metalGrad)" stroke="#7f8c8d" stroke-width="0.5" />
    
    <!-- Blade 2 (Right) -->
    <g transform="rotate(72)">
      <path d="M 0,0 C -15,-25 -25,-55 -10,-75 C -2,-85 15,-80 20,-65 C 22,-45 10,-20 0,0" fill="url(#metalGrad)" stroke="#7f8c8d" stroke-width="0.5" />
    </g>
    
    <!-- Blade 3 (Bottom Right) -->
    <g transform="rotate(144)">
      <path d="M 0,0 C -15,-25 -25,-55 -10,-75 C -2,-85 15,-80 20,-65 C 22,-45 10,-20 0,0" fill="url(#metalGrad)" stroke="#7f8c8d" stroke-width="0.5" />
    </g>
    
    <!-- Blade 4 (Bottom Left) -->
    <g transform="rotate(216)">
      <path d="M 0,0 C -15,-25 -25,-55 -10,-75 C -2,-85 15,-80 20,-65 C 22,-45 10,-20 0,0" fill="url(#metalGrad)" stroke="#7f8c8d" stroke-width="0.5" />
    </g>
    
    <!-- Blade 5 (Left) -->
    <g transform="rotate(288)">
      <path d="M 0,0 C -15,-25 -25,-55 -10,-75 C -2,-85 15,-80 20,-65 C 22,-45 10,-20 0,0" fill="url(#metalGrad)" stroke="#7f8c8d" stroke-width="0.5" />
    </g>

    <!-- Center Hub -->
    <circle cx="0" cy="0" r="22" fill="url(#metalGrad)" stroke="#34495e" stroke-width="1.5" />
    <circle cx="0" cy="0" r="14" fill="#2c3e50" stroke="#7f8c8d" stroke-width="1" />
    <!-- Center Shaft Hole -->
    <circle cx="0" cy="0" r="8" fill="#111" />
    <!-- Shaft Keyway -->
    <rect x="-3" y="-10" width="6" height="6" fill="#111" />
  </g>
</svg>
